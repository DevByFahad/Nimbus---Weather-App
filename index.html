<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Nimbus — Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="bg-nebula">
        <div class="nb nb1"></div>
        <div class="nb nb2"></div>
        <div class="nb nb3"></div>
    </div>

    <div class="shell">

        <header class="header">
            <div class="brand">Nimbus</div>
            <div class="header-right">
                <div class="unit-toggle" role="group" aria-label="Temperature unit">
                    <button class="active" id="btnC" aria-pressed="true">°C</button>
                    <button id="btnF" aria-pressed="false">°F</button>
                </div>
            </div>
        </header>

        <div class="search-row">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" id="cityInput" placeholder="Search any city…" aria-label="Search for a city" />
            </div>
            <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div class="state visible" id="stateLoading" aria-live="polite">
            <div class="spinner" role="status" aria-label="Loading"></div>
            <p class="state-msg">Fetching weather…</p>
        </div>

        <div class="state" id="stateError" role="alert">
            <span class="state-em">🌧️</span>
            <p class="state-msg" id="stateErrorMsg">City not found. Try another name.</p>
        </div>

        <div class="content" id="content">

            <div class="card hero" id="heroCard">
                <div class="hero-left">
                    <p class="hero-tag" id="heroDate"></p>
                    <h1 class="hero-city" id="heroCity"></h1>
                    <p class="hero-condition" id="heroCondition"></p>
                    <div class="hero-meta">
                        <span class="hero-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path
                                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                            </svg>
                            Humidity <span id="mHumidity"></span>%
                        </span>
                        <span class="hero-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path
                                    d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />
                            </svg>
                            Wind <span id="mWind"></span> km/h
                        </span>
                        <span class="hero-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            Visibility <span id="mVis"></span> km
                        </span>
                    </div>
                </div>
                <div class="hero-right">
                    <span class="hero-emoji" id="heroEmoji" aria-hidden="true"></span>
                    <div class="hero-temp" id="heroTemp"></div>
                    <div class="hero-feels" id="heroFeels"></div>
                </div>
            </div>

            <div class="stats-row">
                <div class="card stat-card">
                    <div class="stat-top">
                        <div class="stat-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                            </svg>
                        </div>
                        <span class="stat-lbl">Humidity</span>
                    </div>
                    <div class="stat-val" id="sHumidity">—<sub>%</sub></div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fg" id="bHumidity" style="width:0%"></div>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="stat-top">
                        <div class="stat-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />
                            </svg>
                        </div>
                        <span class="stat-lbl">Wind speed</span>
                    </div>
                    <div class="stat-val" id="sWind">—<sub> km/h</sub></div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fg" id="bWind" style="width:0%"></div>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="stat-top">
                        <div class="stat-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 8v4l3 3" />
                            </svg>
                        </div>
                        <span class="stat-lbl">Pressure</span>
                    </div>
                    <div class="stat-val" id="sPressure">—<sub> hPa</sub></div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fg" id="bPressure" style="width:0%"></div>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="stat-top">
                        <div class="stat-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </div>
                        <span class="stat-lbl">Visibility</span>
                    </div>
                    <div class="stat-val" id="sVis">—<sub> km</sub></div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fg" id="bVis" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div>
                <p class="sec-label">Hourly forecast</p>
                <div class="hourly-scroll card" id="hourlyScroll" style="padding:.75rem 1rem;" role="list"
                    aria-label="Hourly forecast"></div>
            </div>

            <div>
                <p class="sec-label">5-day forecast</p>
                <div class="card forecast-list" id="forecastList" style="padding:.75rem 1rem;" role="list"
                    aria-label="5-day forecast"></div>
            </div>

            <div class="extras-grid">
                <div class="card extra-card">
                    <p class="sec-label">UV index</p>
                    <div class="uv-big" id="uvNum">—</div>
                    <div class="uv-lbl" id="uvLbl"></div>
                    <div class="uv-bar-bg">
                        <div class="uv-bar-fg" id="uvBar" style="width:0%"></div>
                    </div>
                </div>
                <div class="card extra-card">
                    <p class="sec-label">Sunrise &amp; sunset</p>
                    <div class="sun-row">
                        <div class="sun-item">
                            <span class="sun-em" aria-hidden="true">🌅</span>
                            <div class="sun-t" id="sunriseT">—</div>
                            <div class="sun-sub">Sunrise</div>
                        </div>
                        <div class="sun-line">
                            <div class="sun-prog" id="sunProg" style="width:0%"></div>
                        </div>
                        <div class="sun-item">
                            <span class="sun-em" aria-hidden="true">🌇</span>
                            <div class="sun-t" id="sunsetT">—</div>
                            <div class="sun-sub">Sunset</div>
                        </div>
                    </div>
                </div>
                <div class="card extra-card">
                    <p class="sec-label">Wind direction</p>
                    <div class="wind-compass" role="img" id="windCompass" aria-label="Wind compass">
                        <div class="compass-labels" aria-hidden="true">
                            <span class="cl">N</span><span class="cs">S</span>
                            <span class="cw">W</span><span class="ce">E</span>
                        </div>
                        <div class="wind-needle" id="windNeedle"></div>
                    </div>
                    <div class="wind-speed-big" id="windBig">—</div>
                    <div class="wind-dir-txt" id="windDir"></div>
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
